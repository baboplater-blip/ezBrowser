<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" />
    <title>Mod 관리</title>
    <style>
      :root { color-scheme: light dark;
        --bg: #F7F7F8; --fg: #1A1A1A; --muted: #5F5F66;
        --card: #FFFFFF; --border: #E5E5E8; --accent: #3478F6;
        --hover: #EDEDEF; --danger: #C82A38; --warn: #B45309;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0F0F12; --fg: #F2F2F5; --muted: #9B9BA3;
          --card: #1A1A1F; --border: #2A2A30; --accent: #5A93F9; --hover: #25252C; --warn: #F59E0B; }
      }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', sans-serif; }
      .wrap { max-width: 920px; margin: 0 auto; padding: 24px 32px; }
      h1 { margin: 0 0 8px; font-size: 22px; }
      .lead { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
      .warn-banner { background: rgba(180, 83, 9, 0.1); border: 1px solid var(--warn); color: var(--warn);
        padding: 10px 14px; border-radius: 8px; margin-bottom: 20px; font-size: 12px; }
      .mod-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
        padding: 14px 16px; margin-bottom: 10px; }
      .mod-card.error { border-color: var(--danger); }
      .mod-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
      .mod-head .name { font-weight: 600; font-size: 14px; flex: 1; }
      .mod-head .version { color: var(--muted); font-size: 11px; font-family: 'Menlo', monospace; }
      .desc { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
      .meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
      .chip { padding: 2px 8px; border-radius: 10px; font-size: 10px;
        background: var(--hover); color: var(--muted); }
      .chip.perm { background: rgba(52,120,246,.15); color: var(--accent); }
      .actions { display: flex; gap: 6px; flex-wrap: wrap; }
      .toggle { width: 36px; height: 20px; background: var(--hover); border-radius: 10px;
        position: relative; cursor: pointer; flex-shrink: 0; }
      .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
        background: white; border-radius: 50%; transition: transform 0.15s ease; }
      .toggle.on { background: var(--accent); }
      .toggle.on::after { transform: translateX(16px); }
      button.btn { height: 28px; padding: 0 12px; border-radius: 14px;
        border: 1px solid var(--border); background: var(--card); color: inherit;
        cursor: pointer; font-size: 11px; }
      button.btn:hover { border-color: var(--accent); color: var(--accent); }
      button.btn.danger { color: var(--danger); }
      button.btn.danger:hover { border-color: var(--danger); }
      .error-msg { color: var(--danger); font-size: 11px; font-family: 'Menlo', monospace;
        background: rgba(200, 42, 56, 0.08); padding: 6px 10px; border-radius: 6px; margin-bottom: 8px; }
      .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
      .empty-state code { background: var(--hover); padding: 2px 6px; border-radius: 4px; font-size: 11px; }
      .path { font-family: 'Menlo', monospace; font-size: 10px; color: var(--muted); }
    
      /* ===== Emil 모션 폴리시 (emilkowalski/skills · emil-design-eng) ===== */
      button:not(.toggle):not(:disabled) { transition: transform 0.12s cubic-bezier(0.23, 1, 0.32, 1); }
      button:not(.toggle):not(:disabled):active { transform: scale(0.97); }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Mod (실험적)</h1>
      <div class="lead">확장보다 깊은 후킹 — 메뉴·탭 lifecycle·스토리지를 직접 제어합니다.
        Mod 는 신뢰된 코드만 활성화하세요.</div>
      <div class="warn-banner">⚠ Mod 는 메인 프로세스에서 실행됩니다. 알 수 없는 출처의 코드는 절대 활성화하지 마세요.
        설치: <code>%APPDATA%/browser-build/mods/&lt;id&gt;/</code> 에 <code>manifest.json</code> + <code>index.js</code> 배치 후 페이지 새로고침.</div>
      <div id="list"></div>
    </div>
    <script>
      let mods = []

      function escape(s) { return String(s ?? '').replace(/</g, '&lt;') }

      async function reload() {
        if (!window.internalAPI) {
          document.getElementById('list').innerHTML = '<div class="empty-state">internalAPI 미주입</div>'
          return
        }
        mods = await window.internalAPI.mod.list()
        render()
      }

      function render() {
        const el = document.getElementById('list')
        if (mods.length === 0) {
          el.innerHTML = '<div class="empty-state">설치된 Mod 가 없습니다.<br><br>'
            + '<code>%APPDATA%/browser-build/mods/my-mod/</code> 디렉터리를 만들고<br>'
            + '<code>manifest.json</code> 과 <code>index.js</code> 를 배치한 후 이 페이지를 새로고침하세요.</div>'
          return
        }
        el.innerHTML = mods.map((m) => {
          const permChips = m.permissions.map((p) => '<span class="chip perm">' + escape(p) + '</span>').join('')
          return '<div class="mod-card ' + (m.hasError ? 'error' : '') + '">'
            + '<div class="mod-head">'
            +   '<div class="name">' + escape(m.name) + '</div>'
            +   '<div class="version">v' + escape(m.version) + '</div>'
            +   '<div class="toggle ' + (m.enabled ? 'on' : '') + '" data-toggle="' + m.id + '"></div>'
            + '</div>'
            + (m.description ? '<div class="desc">' + escape(m.description) + '</div>' : '')
            + (m.author ? '<div class="desc">by ' + escape(m.author) + '</div>' : '')
            + '<div class="meta-row">' + permChips + '<span class="chip">' + escape(m.id) + '</span></div>'
            + (m.hasError ? '<div class="error-msg">⚠ ' + escape(m.errorMessage || 'unknown error') + '</div>' : '')
            + '<div class="path">' + escape(m.path) + '</div>'
            + '<div class="actions" style="margin-top:8px;">'
            +   '<button class="btn" data-reload="' + m.id + '">↻ 재로드</button>'
            +   '<button class="btn danger" data-remove="' + m.id + '">삭제 (디렉터리 제거)</button>'
            + '</div>'
            + '</div>'
        }).join('')
        bind()
      }

      function bind() {
        document.querySelectorAll('[data-toggle]').forEach((el) => {
          el.addEventListener('click', async () => {
            const id = el.dataset.toggle
            const enabled = !el.classList.contains('on')
            await window.internalAPI.mod.setEnabled(id, enabled)
          })
        })
        document.querySelectorAll('[data-reload]').forEach((el) => {
          el.addEventListener('click', async () => {
            await window.internalAPI.mod.reload(el.dataset.reload)
          })
        })
        document.querySelectorAll('[data-remove]').forEach((el) => {
          el.addEventListener('click', async () => {
            const id = el.dataset.remove
            const mod = mods.find((m) => m.id === id)
            if (!mod) return
            if (!confirm('"' + mod.name + '" Mod 디렉터리를 완전히 삭제할까요?\n\n경로: ' + mod.path)) return
            await window.internalAPI.mod.remove(id)
          })
        })
      }

      if (window.internalAPI) {
        window.internalAPI.mod.onChanged(() => reload())
      }
      reload()
    </script>
  </body>
</html>
