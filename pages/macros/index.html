<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" />
    <title>자동화 매크로</title>
    <style>
      :root { color-scheme: light dark;
        --bg: #F7F7F8; --fg: #1A1A1A; --muted: #5F5F66;
        --card: #FFFFFF; --border: #E5E5E8; --accent: #3478F6;
        --hover: #EDEDEF; --danger: #C82A38;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0F0F12; --fg: #F2F2F5; --muted: #9B9BA3;
          --card: #1A1A1F; --border: #2A2A30; --accent: #5A93F9; --hover: #25252C; }
      }
      html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
      .wrap { display: flex; flex-direction: column; height: 100%; }
      header { padding: 20px 24px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
      header h1 { font-size: 20px; margin: 0; flex: 1; }
      button.btn { height: 30px; padding: 0 14px; border-radius: 15px;
        border: 1px solid var(--border); background: var(--card); color: inherit;
        cursor: pointer; font-size: 12px; }
      button.btn:hover { border-color: var(--accent); color: var(--accent); }
      button.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
      button.btn.danger { color: var(--danger); border-color: var(--danger); }
      .body { flex: 1; display: grid; grid-template-columns: 320px 1fr; min-height: 0; }
      aside { border-right: 1px solid var(--border); overflow: auto; padding: 12px; }
      .macro-card { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
        background: var(--card); margin-bottom: 8px; cursor: pointer; }
      .macro-card:hover { border-color: var(--accent); }
      .macro-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(52,120,246,.15); }
      .macro-card .name { font-weight: 500; }
      .macro-card .meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
      .chip { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px;
        background: var(--hover); color: var(--muted); margin-right: 4px; }
      .chip.on { background: var(--accent); color: white; }
      main { padding: 20px 24px; overflow: auto; }
      h2 { font-size: 16px; margin: 0 0 14px; }
      .field { display: grid; grid-template-columns: 120px 1fr; gap: 10px; margin-bottom: 10px; align-items: center; }
      .field label { color: var(--muted); font-size: 12px; }
      .field input, .field select, .field textarea {
        background: var(--card); border: 1px solid var(--border); color: inherit;
        padding: 6px 10px; border-radius: 6px; font-size: 13px; font-family: inherit;
      }
      .field textarea { font-family: 'Menlo', 'Consolas', monospace; font-size: 12px; min-height: 70px; resize: vertical; }
      .toggle { width: 36px; height: 20px; background: var(--hover); border-radius: 10px;
        position: relative; cursor: pointer; }
      .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
        background: white; border-radius: 50%; transition: transform 0.15s ease; }
      .toggle.on { background: var(--accent); }
      .toggle.on::after { transform: translateX(16px); }
      .actions-section { margin-top: 18px; }
      .action-row { display: grid; grid-template-columns: 110px 1fr 28px; gap: 8px;
        margin-bottom: 6px; align-items: center; }
      .action-row select, .action-row input { background: var(--card); border: 1px solid var(--border);
        color: inherit; padding: 5px 8px; border-radius: 6px; font-size: 12px; }
      .action-row .remove { background: transparent; border: none; color: var(--muted); cursor: pointer;
        font-size: 16px; padding: 0; }
      .action-row .remove:hover { color: var(--danger); }
      .empty-state { padding: 40px 20px; text-align: center; color: var(--muted); }
    
      /* ===== Emil 모션 폴리시 (emilkowalski/skills · emil-design-eng) ===== */
      button:not(.toggle):not(:disabled) { transition: transform 0.12s cubic-bezier(0.23, 1, 0.32, 1); }
      button:not(.toggle):not(:disabled):active { transform: scale(0.97); }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>자동화 매크로</h1>
        <button class="btn primary" id="new-btn">+ 새 매크로</button>
      </header>
      <div class="body">
        <aside id="list"><div class="empty-state">로딩 중…</div></aside>
        <main id="editor"><div class="empty-state">좌측에서 매크로를 선택하거나 새로 만드세요.</div></main>
      </div>
    </div>
    <script>
      let macros = []
      let selected = null

      function escape(s) { return String(s ?? '').replace(/</g, '&lt;') }

      async function reload() {
        if (!window.internalAPI) {
          document.getElementById('list').innerHTML = '<div class="empty-state">internalAPI 미주입</div>'
          return
        }
        macros = await window.internalAPI.macro.list()
        renderList()
        if (selected) {
          const m = await window.internalAPI.macro.get(selected.id)
          if (m) selected = m
          renderEditor()
        }
      }

      function renderList() {
        const el = document.getElementById('list')
        if (macros.length === 0) {
          el.innerHTML = '<div class="empty-state">매크로가 없습니다.<br><br>"+ 새 매크로" 로 시작하세요.</div>'
          return
        }
        el.innerHTML = macros.map((m) => {
          const trigName = m.trigger.type === 'url' ? 'URL' : m.trigger.type === 'startup' ? '시작' : '단축키'
          return '<div class="macro-card ' + (selected && selected.id === m.id ? 'active' : '') + '" data-id="' + m.id + '">'
            + '<div class="name">' + escape(m.name) + '</div>'
            + '<div class="meta"><span class="chip ' + (m.enabled ? 'on' : '') + '">' + (m.enabled ? '활성' : '꺼짐') + '</span>'
            + '<span class="chip">' + trigName + ' ' + escape(m.trigger.value || '—') + '</span></div>'
            + '</div>'
        }).join('')
        el.querySelectorAll('.macro-card').forEach((card) => {
          card.addEventListener('click', async () => {
            const id = card.dataset.id
            const full = await window.internalAPI.macro.get(id)
            selected = full
            renderList()
            renderEditor()
          })
        })
      }

      function renderEditor() {
        const el = document.getElementById('editor')
        if (!selected) {
          el.innerHTML = '<div class="empty-state">좌측에서 매크로를 선택하거나 새로 만드세요.</div>'
          return
        }
        const m = selected
        el.innerHTML = '<h2>' + escape(m.name || '이름 없는 매크로') + '</h2>'
          + '<div class="field"><label>이름</label><input type="text" id="m-name" value="' + escape(m.name) + '" /></div>'
          + '<div class="field"><label>설명</label><input type="text" id="m-desc" value="' + escape(m.description) + '" /></div>'
          + '<div class="field"><label>활성</label><div class="toggle ' + (m.enabled ? 'on' : '') + '" id="m-enabled"></div></div>'
          + '<div class="field"><label>트리거</label><select id="m-trig-type">'
          +   '<option value="shortcut"' + (m.trigger.type === 'shortcut' ? ' selected' : '') + '>단축키 (수동/팔레트 실행)</option>'
          +   '<option value="url"' + (m.trigger.type === 'url' ? ' selected' : '') + '>URL 매칭 (* 와일드카드)</option>'
          +   '<option value="startup"' + (m.trigger.type === 'startup' ? ' selected' : '') + '>앱 시작 시</option>'
          + '</select></div>'
          + '<div class="field"><label>트리거 값</label><input type="text" id="m-trig-val" value="' + escape(m.trigger.value) + '" placeholder="https://*.example.com/*" /></div>'
          + '<div class="actions-section"><h2 style="font-size:14px;">실행할 액션</h2>'
          + (m.actions.length === 0 ? '<div class="empty-state" style="padding:20px;">액션이 없습니다. 아래 "+ 액션 추가" 로 시작하세요.</div>' : '')
          + '<div id="actions-list">'
          +   m.actions.map((a, i) => actionRow(a, i)).join('')
          + '</div>'
          + '<button class="btn" id="add-action">+ 액션 추가</button>'
          + '</div>'
          + '<div style="margin-top:24px;display:flex;gap:8px;">'
          + '<button class="btn primary" id="save-btn">저장</button>'
          + '<button class="btn" id="run-btn">▶ 즉시 실행</button>'
          + '<button class="btn danger" id="delete-btn" style="margin-left:auto;">삭제</button>'
          + '</div>'
        bind()
      }

      function actionRow(a, i) {
        const types = [
          { v: 'navigate', l: '🌐 URL 이동' },
          { v: 'wait', l: '⏱ 대기 (ms)' },
          { v: 'click', l: '🖱 클릭 (선택자)' },
          { v: 'js', l: '⚡ JS 실행' },
          { v: 'toast', l: '💬 토스트 메시지' },
          { v: 'screenshot', l: '📸 스크린샷' },
        ]
        return '<div class="action-row" data-i="' + i + '">'
          + '<select data-action-type="' + i + '">' + types.map((t) =>
              '<option value="' + t.v + '"' + (a.type === t.v ? ' selected' : '') + '>' + t.l + '</option>'
            ).join('') + '</select>'
          + '<input type="text" data-action-value="' + i + '" value="' + escape(a.value) + '" placeholder="' + (a.type === 'js' ? "alert('hi')" : a.type === 'navigate' ? 'https://example.com' : a.type === 'wait' ? '1000' : '값') + '" />'
          + '<button class="remove" data-action-remove="' + i + '">×</button>'
          + '</div>'
      }

      function bind() {
        const nameEl = document.getElementById('m-name')
        if (nameEl) nameEl.addEventListener('input', () => { selected.name = nameEl.value })
        const descEl = document.getElementById('m-desc')
        if (descEl) descEl.addEventListener('input', () => { selected.description = descEl.value })
        const enabledEl = document.getElementById('m-enabled')
        if (enabledEl) enabledEl.addEventListener('click', () => {
          selected.enabled = !selected.enabled
          enabledEl.classList.toggle('on', selected.enabled)
        })
        const trigType = document.getElementById('m-trig-type')
        if (trigType) trigType.addEventListener('change', () => { selected.trigger.type = trigType.value })
        const trigVal = document.getElementById('m-trig-val')
        if (trigVal) trigVal.addEventListener('input', () => { selected.trigger.value = trigVal.value })
        document.querySelectorAll('[data-action-type]').forEach((el) => {
          el.addEventListener('change', () => {
            const i = parseInt(el.dataset.actionType, 10)
            selected.actions[i].type = el.value
          })
        })
        document.querySelectorAll('[data-action-value]').forEach((el) => {
          el.addEventListener('input', () => {
            const i = parseInt(el.dataset.actionValue, 10)
            selected.actions[i].value = el.value
          })
        })
        document.querySelectorAll('[data-action-remove]').forEach((el) => {
          el.addEventListener('click', () => {
            const i = parseInt(el.dataset.actionRemove, 10)
            selected.actions.splice(i, 1)
            renderEditor()
          })
        })
        const addAction = document.getElementById('add-action')
        if (addAction) addAction.addEventListener('click', () => {
          selected.actions.push({ type: 'navigate', value: '' })
          renderEditor()
        })
        const saveBtn = document.getElementById('save-btn')
        if (saveBtn) saveBtn.addEventListener('click', async () => {
          const saved = await window.internalAPI.macro.save(selected)
          selected = saved
          await reload()
        })
        const runBtn = document.getElementById('run-btn')
        if (runBtn) runBtn.addEventListener('click', async () => {
          if (!selected || !selected.id) { alert('먼저 저장하세요'); return }
          const r = await window.internalAPI.macro.run(selected.id)
          if (!r.ok) alert('실행 실패: ' + (r.error || ''))
        })
        const delBtn = document.getElementById('delete-btn')
        if (delBtn) delBtn.addEventListener('click', async () => {
          if (!selected.id || !confirm('"' + selected.name + '" 매크로를 삭제할까요?')) return
          await window.internalAPI.macro.remove(selected.id)
          selected = null
          await reload()
        })
      }

      document.getElementById('new-btn').addEventListener('click', () => {
        selected = {
          id: '',
          name: '새 매크로',
          description: '',
          enabled: true,
          trigger: { type: 'shortcut', value: '' },
          actions: [{ type: 'navigate', value: '' }],
          createdAt: Date.now(),
          updatedAt: Date.now(),
        }
        renderEditor()
      })

      if (window.internalAPI) {
        window.internalAPI.macro.onChanged(() => reload())
      }
      reload()
    </script>
  </body>
</html>
