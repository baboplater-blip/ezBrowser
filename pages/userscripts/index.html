<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" />
    <title>Userscripts</title>
    <style>
      :root { color-scheme: light dark;
        --bg: #F7F7F8; --fg: #1A1A1A; --muted: #5F5F66;
        --card: #FFFFFF; --border: #E5E5E8; --accent: #3478F6;
        --hover: #EDEDEF; --danger: #C82A38;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0F0F12; --fg: #F2F2F5; --muted: #9B9BA3;
          --card: #1A1A1F; --border: #2A2A30; --accent: #5A93F9; --hover: #25252C; }
      }
      html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
      .wrap { display: flex; flex-direction: column; height: 100%; }
      header { padding: 20px 24px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
      header h1 { font-size: 20px; margin: 0; flex: 1; }
      button.btn { height: 30px; padding: 0 14px; border-radius: 15px;
        border: 1px solid var(--border); background: var(--card); color: inherit;
        cursor: pointer; font-size: 12px; }
      button.btn:hover { border-color: var(--accent); color: var(--accent); }
      button.btn.primary { background: var(--accent); color: white; border-color: transparent; }
      button.btn.primary:hover { opacity: 0.9; color: white; }
      button.btn.danger { color: var(--danger); }
      button.btn.danger:hover { background: var(--danger); color: white; border-color: var(--danger); }

      main { flex: 1; display: flex; min-height: 0; }
      aside { width: 320px; border-right: 1px solid var(--border); padding: 12px; overflow-y: auto; }
      .script-item {
        padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
        cursor: pointer; border: 1px solid transparent;
      }
      .script-item:hover { background: var(--hover); }
      .script-item.selected { background: var(--hover); border-color: var(--accent); }
      .script-item .name { font-weight: 500; font-size: 13px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
      .script-item .toggle { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); }
      .script-item .toggle.on { background: var(--accent); color: white; border-color: transparent; }
      .script-item .desc { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .script-item .meta { font-size: 10px; color: var(--muted); margin-top: 4px; }
      .empty-side { padding: 32px 8px; text-align: center; color: var(--muted); font-size: 12px; }

      section.editor { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 16px 20px; }
      .editor-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
      .editor-bar .name { flex: 1; font-size: 14px; font-weight: 500; }
      textarea {
        flex: 1; width: 100%; box-sizing: border-box; min-height: 0;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card); color: inherit;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        font-size: 12px; line-height: 1.5;
        resize: none; outline: none;
      }
      textarea:focus { border-color: var(--accent); }
      .stub {
        flex: 1; display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 12px;
        color: var(--muted); font-size: 13px;
      }
      .stub code { background: var(--card); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; }
    
      /* ===== Emil 모션 폴리시 (emilkowalski/skills · emil-design-eng) ===== */
      button:not(.toggle):not(:disabled) { transition: transform 0.12s cubic-bezier(0.23, 1, 0.32, 1); }
      button:not(.toggle):not(:disabled):active { transform: scale(0.97); }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Userscripts <span style="color:var(--muted);font-size:11px;margin-left:8px;">Tampermonkey 호환</span></h1>
        <button id="new-btn" class="btn primary">+ 새 스크립트</button>
      </header>
      <main>
        <aside id="list-aside">
          <div class="empty-side">로딩 중…</div>
        </aside>
        <section class="editor" id="editor-section">
          <div class="stub" id="stub">
            <div>왼쪽 목록에서 스크립트를 선택하거나 새로 만드세요.</div>
            <div>유저스크립트는 <code>// ==UserScript==</code> 메타데이터 블록 + 본문 코드입니다.</div>
          </div>
          <div id="editor-content" style="display:none;flex:1;display:none;flex-direction:column;min-height:0;">
            <div class="editor-bar">
              <span class="name" id="editor-name">새 스크립트</span>
              <button id="enabled-btn" class="btn">활성</button>
              <button id="save-btn" class="btn primary">저장</button>
              <button id="delete-btn" class="btn danger">삭제</button>
            </div>
            <textarea id="source-area" spellcheck="false" placeholder="// ==UserScript==&#10;// @name        예시 스크립트&#10;// @match       https://example.com/*&#10;// @description 무엇을 하는지&#10;// @version     1.0&#10;// @grant       none&#10;// ==/UserScript==&#10;&#10;(function() {&#10;  'use strict'&#10;  console.log('Hello from userscript')&#10;})()"></textarea>
          </div>
        </section>
      </main>
    </div>
    <script>
      const listAside = document.getElementById('list-aside')
      const stub = document.getElementById('stub')
      const editorContent = document.getElementById('editor-content')
      const editorName = document.getElementById('editor-name')
      const sourceArea = document.getElementById('source-area')
      const newBtn = document.getElementById('new-btn')
      const saveBtn = document.getElementById('save-btn')
      const deleteBtn = document.getElementById('delete-btn')
      const enabledBtn = document.getElementById('enabled-btn')

      let scripts = []
      let currentId = null
      let currentEnabled = true

      const STARTER = `// ==UserScript==
// @name        새 스크립트
// @description 설명
// @version     1.0
// @match       https://example.com/*
// @grant       none
// @run-at      document-end
// ==/UserScript==

(function() {
  'use strict'
  console.log('userscript ready')
})()
`

      function showEditor() {
        stub.style.display = 'none'
        editorContent.style.display = 'flex'
      }
      function showStub() {
        stub.style.display = ''
        editorContent.style.display = 'none'
      }
      function escape(s) { return String(s ?? '').replace(/</g, '&lt;') }

      function renderList() {
        if (!scripts.length) {
          listAside.innerHTML = '<div class="empty-side">스크립트가 없습니다.<br/>위 "+ 새 스크립트" 로 시작하세요.</div>'
          return
        }
        listAside.innerHTML = scripts.map(function(s) {
          const sel = s.id === currentId ? 'selected' : ''
          const toggle = s.enabled ? '<span class="toggle on">ON</span>' : '<span class="toggle">OFF</span>'
          const matchPreview = s.match && s.match.length ? s.match[0] + (s.match.length > 1 ? ' 외 ' + (s.match.length - 1) : '') : '(매치 없음)'
          return '<div class="script-item ' + sel + '" data-id="' + s.id + '">'
            + '<div class="name">' + toggle + ' ' + escape(s.name) + '</div>'
            + '<div class="desc">' + escape(s.description || '설명 없음') + '</div>'
            + '<div class="meta">' + escape(matchPreview) + '</div>'
            + '</div>'
        }).join('')
        listAside.querySelectorAll('.script-item').forEach(function(el) {
          el.addEventListener('click', function() { selectScript(el.dataset.id) })
        })
      }

      async function selectScript(id) {
        const full = await window.internalAPI.userscript.get(id)
        if (!full) return
        currentId = full.id
        currentEnabled = full.enabled
        editorName.textContent = full.name
        sourceArea.value = full.source
        enabledBtn.textContent = full.enabled ? '활성 ✓' : '비활성'
        enabledBtn.classList.toggle('primary', full.enabled)
        showEditor()
        renderList()
      }

      newBtn.addEventListener('click', function() {
        currentId = null
        currentEnabled = true
        editorName.textContent = '새 스크립트'
        sourceArea.value = STARTER
        enabledBtn.textContent = '활성 ✓'
        enabledBtn.classList.add('primary')
        showEditor()
        renderList()
        sourceArea.focus()
      })

      saveBtn.addEventListener('click', async function() {
        const source = sourceArea.value
        if (!source.trim()) return alert('빈 스크립트는 저장 안 됩니다.')
        const saved = await window.internalAPI.userscript.save({ id: currentId || undefined, source })
        currentId = saved.id
        editorName.textContent = saved.name
      })

      deleteBtn.addEventListener('click', async function() {
        if (!currentId) { sourceArea.value = ''; showStub(); return }
        if (!confirm('이 스크립트를 삭제할까요?')) return
        await window.internalAPI.userscript.remove(currentId)
        currentId = null
        showStub()
      })

      enabledBtn.addEventListener('click', async function() {
        if (!currentId) {
          currentEnabled = !currentEnabled
          enabledBtn.textContent = currentEnabled ? '활성 ✓' : '비활성'
          enabledBtn.classList.toggle('primary', currentEnabled)
          return
        }
        const next = !currentEnabled
        await window.internalAPI.userscript.setEnabled(currentId, next)
        currentEnabled = next
        enabledBtn.textContent = next ? '활성 ✓' : '비활성'
        enabledBtn.classList.toggle('primary', next)
      })

      async function reload() {
        if (!window.internalAPI) { listAside.innerHTML = '<div class="empty-side">internalAPI 미주입</div>'; return }
        scripts = await window.internalAPI.userscript.list()
        renderList()
      }

      if (window.internalAPI) {
        window.internalAPI.userscript.onChanged(function(list) {
          scripts = list
          renderList()
        })
      }
      reload()
    </script>
  </body>
</html>
