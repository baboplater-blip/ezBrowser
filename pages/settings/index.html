<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" />
    <title>설정</title>
    <style>
      :root { color-scheme: light dark;
        --bg: #F7F7F8; --fg: #1A1A1A; --muted: #5F5F66;
        --card: #FFFFFF; --border: #E5E5E8; --accent: #3478F6;
        --hover: #EDEDEF; --danger: #C82A38;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0F0F12; --fg: #F2F2F5; --muted: #9B9BA3;
          --card: #1A1A1F; --border: #2A2A30; --accent: #5A93F9; --hover: #25252C; }
      }
      html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
      .wrap { display: flex; height: 100%; }
      aside { width: 240px; border-right: 1px solid var(--border); padding: 18px 12px; box-sizing: border-box;
        flex: 0 0 240px; overflow-y: auto; }
      aside h1 { font-size: 18px; margin: 0 0 18px 4px; }
      .nav-item {
        padding: 8px 12px; border-radius: 8px;
        cursor: pointer; font-size: 13px;
        margin-bottom: 2px;
      }
      .nav-item:hover { background: var(--hover); }
      .nav-item.active { background: var(--hover); color: var(--accent); font-weight: 500; }

      main { flex: 1; padding: 24px 36px; overflow-y: auto; min-width: 0; }
      main h2 { font-size: 22px; margin: 0 0 20px; font-weight: 600; }
      .section { margin-bottom: 32px; }
      .section h3 { font-size: 14px; color: var(--muted); margin: 0 0 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

      .row { display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
        margin-bottom: 6px; }
      .row .label { font-size: 13px; }
      .row .desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .row .control { flex: 0 0 auto; margin-left: 16px; }
      .row.column { flex-direction: column; align-items: stretch; }
      .row.column .control { margin-left: 0; margin-top: 8px; }

      input[type=text], input[type=number], select, textarea {
        padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
        background: var(--bg); color: inherit; font-size: 13px; font-family: inherit;
        min-width: 180px;
      }
      input[type=text]:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
      textarea { width: 100%; box-sizing: border-box; min-height: 60px; resize: vertical;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; }

      /* iOS-style toggle */
      .toggle {
        position: relative; width: 40px; height: 22px;
        background: var(--border); border-radius: 11px; cursor: pointer;
        transition: background 0.18s;
      }
      .toggle::after {
        content: ''; position: absolute; top: 2px; left: 2px;
        width: 18px; height: 18px; border-radius: 50%; background: white;
        transition: transform 0.18s cubic-bezier(0.23, 1, 0.32, 1);
        box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      }
      .toggle.on { background: var(--accent); }
      .toggle.on::after { transform: translateX(18px); }

      .btn {
        padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
        background: var(--card); color: inherit; cursor: pointer; font-size: 12px;
      }
      .btn:hover { border-color: var(--accent); color: var(--accent); }
      .btn.primary { background: var(--accent); color: white; border-color: transparent; }
      .btn.danger { color: var(--danger); }
      .btn.danger:hover { background: var(--danger); color: white; border-color: var(--danger); }

      .ai-key-ctl { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

      .ai-diag { margin: 4px 0 10px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); }
      .ai-diag.good { border-color: #30A46C; background: rgba(48,164,108,0.08); }
      .ai-diag.bad { border-color: var(--danger); background: rgba(200,42,56,0.07); }
      .ai-diag.checking { opacity: 0.8; }
      .ai-diag-msg { font-size: 13px; font-weight: 600; }
      .ai-diag-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .ai-diag-fix { font-size: 12px; margin-top: 6px; line-height: 1.5; }
      .ai-diag-detail { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
      .ai-diag-models { margin-top: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
      .ai-diag-swap { font-size: 11px; padding: 3px 9px; }
      .ai-key-ctl input[type="password"] {
        min-width: 200px; padding: 6px 10px; border-radius: 6px;
        border: 1px solid var(--border); background: var(--card); color: inherit; font-size: 12px;
      }
      .ai-key-status { font-size: 12px; color: var(--muted); }
      .ai-key-status.ok { color: var(--accent); }
      .ai-key-status.err { color: var(--danger); }

      .workspace-card {
        background: var(--card); border: 1px solid var(--border); border-radius: 10px;
        padding: 12px 16px; margin-bottom: 8px;
      }
      .workspace-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
      .ws-color-chip {
        width: 24px; height: 24px; border-radius: 6px; cursor: pointer;
        border: 2px solid transparent;
      }
      .ws-color-chip.selected { border-color: var(--fg); box-shadow: 0 0 0 1.5px var(--bg), 0 0 0 3px var(--accent); }
      .ws-color-row { display: flex; gap: 6px; }
      .ws-fields { display: grid; grid-template-columns: 80px 1fr; gap: 8px 12px; align-items: center; }
      .ws-fields label { font-size: 12px; color: var(--muted); }
      .ws-active-badge { font-size: 10px; padding: 2px 8px; border-radius: 8px; background: var(--accent); color: white; }

      .keymap-grid {
        display: grid; grid-template-columns: 1fr auto auto auto;
        gap: 1px; background: var(--border);
        border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
      }
      .keymap-row { display: contents; }
      .keymap-row > div, .keymap-row > button {
        background: var(--card); padding: 8px 12px; font-size: 12px;
        border: none; text-align: left; color: inherit; cursor: pointer;
      }
      .keymap-row.header > div { background: var(--hover); font-weight: 600; font-size: 11px; color: var(--muted); text-transform: uppercase; cursor: default; }
      .keymap-key-btn {
        font-family: 'Consolas', monospace;
        background: var(--bg) !important;
        border: 1px solid var(--border) !important;
        border-radius: 4px;
        min-width: 130px;
        margin: 4px 0;
      }
      .keymap-key-btn:hover { border-color: var(--accent) !important; color: var(--accent) !important; }
      .keymap-key-btn.capturing {
        border-color: var(--accent) !important;
        color: var(--accent) !important;
        background: var(--card) !important;
      }
      .keymap-key-btn.conflict { color: var(--danger) !important; border-color: var(--danger) !important; }
      .keymap-when {
        background: var(--bg) !important;
        border: 1px solid var(--border) !important;
        border-radius: 4px;
        padding: 6px 8px;
        margin: 4px 0;
        min-width: 90px;
      }
      .keymap-remove {
        color: var(--muted);
        background: transparent !important;
        font-size: 14px !important;
        padding: 4px 12px !important;
      }
      .keymap-remove:hover { color: var(--danger); }
      .keymap-action {
        padding: 12px !important;
        display: flex; align-items: center; gap: 8px;
        cursor: default !important;
      }
      .keymap-action-name { flex: 1; }
      .keymap-action-input {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 12px;
        font-family: 'Consolas', monospace;
        width: 100%;
        color: inherit;
      }
      .keymap-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }

      .info-line { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
      .info-line code { background: var(--card); padding: 1px 6px; border-radius: 4px; font-size: 11px; }
      .perm-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .perm-table th { text-align: center; font-weight: 500; color: var(--muted); font-size: 11px; padding: 6px 8px; border-bottom: 1px solid var(--border); }
      .perm-table th:first-child { text-align: left; }
      .perm-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: center; }
      .perm-table td.perm-origin { text-align: left; font-family: monospace; font-size: 12px; word-break: break-all; }
      .perm-table select { padding: 3px 6px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: inherit; }
    
      /* ===== Emil 모션 폴리시 (emilkowalski/skills · emil-design-eng) ===== */
      button:not(.toggle):not(:disabled) { transition: transform 0.12s cubic-bezier(0.23, 1, 0.32, 1); }
      button:not(.toggle):not(:disabled):active { transform: scale(0.97); }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <aside>
        <h1>설정</h1>
        <div class="nav-item active" data-cat="appearance">모양</div>
        <div class="nav-item" data-cat="ai">✨ AI</div>
        <div class="nav-item" data-cat="widgets">새 탭</div>
        <div class="nav-item" data-cat="adblock">광고·트래커 차단</div>
        <div class="nav-item" data-cat="search">검색</div>
        <div class="nav-item" data-cat="privacy">개인정보</div>
        <div class="nav-item" data-cat="permissions">사이트 권한</div>
        <div class="nav-item" data-cat="downloads">다운로드</div>
        <div class="nav-item" data-cat="freedom">자유도</div>
        <div class="nav-item" data-cat="workspace">워크스페이스</div>
        <div class="nav-item" data-cat="keymap">단축키</div>
        <div class="nav-item" data-cat="design">디자인 토큰</div>
        <div class="nav-item" data-cat="update">업데이트</div>
        <div class="nav-item" data-cat="data">데이터 관리</div>
        <div class="nav-item" data-cat="about">정보</div>
      </aside>
      <main id="main"><div>로딩 중…</div></main>
    </div>
    <script>
      let settings = null
      let engines = []
      let workspaces = []
      let activeWorkspaceId = ''
      let keymapData = null
      let tokensData = null
      let permissionList = []
      let aiKeyStatus = null
      let currentCat = 'appearance'

      const COLORS = ['red','orange','yellow','green','blue','purple','pink','gray']
      const COLOR_HEX = {
        red: '#E5484D', orange: '#F76808', yellow: '#FFB224', green: '#30A46C',
        blue: '#3478F6', purple: '#8E4EC6', pink: '#E93D82', gray: '#8E8E93',
      }

      function escape(s) { return String(s ?? '').replace(/</g, '&lt;') }

      async function reload() {
        if (!window.internalAPI) {
          document.getElementById('main').innerHTML = '<div>internalAPI 미주입</div>'
          return
        }
        settings = await window.internalAPI.settings.all()
        engines = await window.internalAPI.search.listEngines()
        const wsState = await window.internalAPI.workspace.state()
        workspaces = wsState.workspaces
        activeWorkspaceId = wsState.activeId
        keymapData = await window.internalAPI.keymap.get()
        tokensData = await window.internalAPI.tokens.get()
        try { permissionList = (window.internalAPI.permissions ? await window.internalAPI.permissions.list() : []) || [] } catch { permissionList = [] }
        try { aiKeyStatus = (window.internalAPI.ai ? await window.internalAPI.ai.keyStatus() : null) } catch { aiKeyStatus = null }
        render()
      }

      document.querySelectorAll('.nav-item').forEach((el) => {
        el.addEventListener('click', () => {
          document.querySelectorAll('.nav-item').forEach((x) => x.classList.remove('active'))
          el.classList.add('active')
          currentCat = el.dataset.cat
          render()
        })
      })

      function render() {
        const main = document.getElementById('main')
        if (!settings) { main.innerHTML = '<div>로딩 중…</div>'; return }
        const fns = { appearance, ai, widgets, adblock, search, privacy, permissions, downloads, freedom, workspace, keymap, design, update, data, about }
        const fn = fns[currentCat] ?? appearance
        main.innerHTML = fn()
        bind()
      }

      function toggleHtml(key, value) {
        return '<div class="toggle ' + (value ? 'on' : '') + '" data-toggle="' + key + '"></div>'
      }
      function selectHtml(key, value, options) {
        return '<select data-select="' + key + '">'
          + options.map((o) => '<option value="' + o.value + '"' + (o.value === value ? ' selected' : '') + '>' + escape(o.label) + '</option>').join('')
          + '</select>'
      }
      function inputHtml(key, value, type) {
        return '<input type="' + (type || 'text') + '" data-input="' + key + '" value="' + escape(value) + '" />'
      }

      function appearance() {
        const a = settings.appearance || {}
        const ui = settings.ui || {}
        return '<h2>모양</h2>'
          + '<div class="section"><h3>전체 테마</h3>'
          + row('테마', '시스템 / 라이트 / 다크 (외피 UI)', selectHtml('appearance.theme', a.theme, [
              { value: 'system', label: '시스템' }, { value: 'light', label: '라이트' }, { value: 'dark', label: '다크' },
            ]))
          + row('밀도', '간격 / 패딩', selectHtml('appearance.density', a.density, [
              { value: 'compact', label: '컴팩트' }, { value: 'regular', label: '보통' }, { value: 'comfy', label: '여유' },
            ]))
          + row('페이지 강제 다크', '모든 사이트에 CSS Filter invert (Ctrl+Shift+D)', toggleHtml('appearance.forcePageDark', a.forcePageDark))
          + row('OS 다크 모드 따라가기', '시스템 테마가 다크일 때만 페이지 다크 자동 적용', toggleHtml('appearance.pageDarkFollowSystem', !!a.pageDarkFollowSystem))
          + row('마우스 제스처', '우클릭 드래그 — ←뒤로 →앞으로 ↑새로고침 ↓새 탭 ↓→ 탭 닫기', toggleHtml('freedom.mouseGestures', settings.freedom?.mouseGestures !== false))
          + row('빠른 검색', '텍스트 선택 시 부유 검색 버튼 표시', toggleHtml('freedom.quickSearch', settings.freedom?.quickSearch !== false))
          + row('호버 단어 번역', 'Alt 키 누른 채로 단어 위 마우스 → 번역 팝업', toggleHtml('freedom.hoverTranslate', !!settings.freedom?.hoverTranslate))
          + '</div>'
          + '<div class="section"><h3>외피 레이아웃</h3>'
          + row('탭바 위치', '상단 / 좌측 / 우측 (Ctrl+Alt+T 순환)', selectHtml('ui.tabbarOrientation', ui.tabbarOrientation || 'top', [
              { value: 'top', label: '상단' }, { value: 'left', label: '좌측 (수직)' }, { value: 'right', label: '우측 (수직)' },
            ]))
          + row('북마크 바 표시', 'Toolbar 아래 즐겨찾기 막대 (Ctrl+Shift+B)', toggleHtml('ui.bookmarkBarShow', ui.bookmarkBarShow !== false))
          + row('워크스페이스 사이드바', '좌측 색 칩 stripe', toggleHtml('ui.workspaceRailOpen', ui.workspaceRailOpen !== false))
          + row('좌측 사이드 패널', '북마크·이력·메모 (Ctrl+B)', toggleHtml('ui.sidepanelLeftOpen', !!ui.sidepanelLeftOpen))
          + row('우측 사이드 패널', '북마크·이력·메모 (Ctrl+Alt+B)', toggleHtml('ui.sidepanelRightOpen', !!ui.sidepanelRightOpen))
          + '</div>'
          + '<div class="section"><h3>시작 동작</h3>'
          + row('브라우저를 열 때',
              '앱 시작 시 무엇을 표시할지 — 비정상 종료 시에는 항상 복원 여부를 물어봅니다',
              selectHtml('startup.mode', settings.startup?.mode || 'newtab', [
                { value: 'newtab', label: '새 탭 (기본)' },
                { value: 'last-session', label: '지난 세션 복원 (탭·그룹·분할·스크롤)' },
                { value: 'urls', label: '지정한 페이지 열기' },
              ]))
          + (settings.startup?.mode === 'urls'
              ? '<div class="row"><div><div class="label">시작 페이지 목록</div>'
                + '<div class="desc">한 줄에 하나씩 (http(s):// 또는 browser://)</div></div>'
                + '<div class="control" style="flex:1;max-width:360px;">'
                + '<textarea id="startup-urls" style="width:100%;min-height:80px;box-sizing:border-box;font:inherit;font-size:12px;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--bg-input,inherit);color:inherit;resize:vertical;">'
                + escape((settings.startup?.urls || []).join('\n')) + '</textarea></div></div>'
              : '')
          + '</div>'
          + '<div class="section"><h3>탭 동작</h3>'
          + row('링크의 새 창 요청 시',
              '사이트가 target="_blank" 나 window.open() 으로 새 창을 띄우려 할 때 동작 — 네이버 메일 아이콘처럼 새 탭으로 강제 열리는 경우에 영향',
              selectHtml('tabs.openBehavior', settings.tabs?.openBehavior || 'new-tab', [
                { value: 'new-tab', label: '새 탭 (전경) — 기본' },
                { value: 'same-tab', label: '현재 탭에서 이동' },
                { value: 'background-tab', label: '새 탭 (백그라운드, 포커스 유지)' },
              ]))
          + '</div>'
      }

      function aiKeyRow(provider) {
        const ks = aiKeyStatus || { anthropic: false, openai: false, storageAvailable: true }
        if (!ks.storageAvailable) {
          return row('API 키', '이 기기에서는 안전한 키 저장(safeStorage)을 쓸 수 없어 키를 저장할 수 없습니다.',
            '<span class="ai-key-status err">저장 불가</span>')
        }
        const set = !!ks[provider]
        const status = set
          ? '<span class="ai-key-status ok">✓ 설정됨</span>'
          : '<span class="ai-key-status">미설정</span>'
        const control = '<div class="ai-key-ctl">'
          + '<input type="password" id="ai-key-input-' + provider + '" autocomplete="off" placeholder="' + (set ? '새 키 입력 시 교체' : 'API 키 붙여넣기') + '" />'
          + '<button class="btn primary" id="ai-key-save-' + provider + '" type="button">저장</button>'
          + (set ? '<button class="btn danger" id="ai-key-clear-' + provider + '" type="button">삭제</button>' : '')
          + status
          + '</div>'
        return row('API 키', 'OS 암호화(safeStorage)로만 저장 — 평문으로 남지 않습니다', control)
      }

      function ai() {
        const a = settings.ai || {}
        const provider = a.provider || 'anthropic'
        let html = '<h2>✨ AI 어시스턴트</h2>'
        html += '<div class="section"><h3>기본</h3>'
        html += row('AI 기능 사용', '사이드바에서 페이지 요약·질문·챗 (툴바 ✨ 또는 Ctrl+Shift+Space)', toggleHtml('ai.enabled', a.enabled !== false))
        html += row('AI 제공자', 'aside 처럼 내 API 키 또는 로컬 모델을 사용합니다 — 비용은 내 키로 부담', selectHtml('ai.provider', provider, [
            { value: 'claude-code', label: 'Claude Code (Claude 구독으로 구동)' },
            { value: 'codex', label: 'Codex (ChatGPT 구독으로 구동)' },
            { value: 'gemini-cli', label: 'Gemini CLI (Google 계정)' },
            { value: 'anthropic', label: 'Claude (Anthropic API 키)' },
            { value: 'openai', label: 'OpenAI (ChatGPT API 키)' },
            { value: 'google', label: 'Google Gemini (무료 티어 키)' },
            { value: 'ollama', label: '로컬 Ollama (무료·프라이빗)' },
          ]))
        html += row('AI 상태 점검', '지금 설정한 AI 가 실제로 작동하는지 확인합니다. 안 되면 원인과 해결책을 알려줍니다.', '<button class="btn" id="aiDiagBtn" type="button">🩺 상태 점검</button>')
        html += '<div id="aiDiagResult" class="ai-diag" style="display:none"></div>'
        html += row('질문에 페이지 내용 포함', '기본으로 현재 페이지 본문을 함께 전송 (사이드바에서 끌 수 있음)', toggleHtml('ai.includePageByDefault', a.includePageByDefault !== false))
        html += row('기억(메모리) 사용', 'AI 가 저장한 개인 컨텍스트를 답변에 참고 — 매번 재설명 불필요 (<a href="browser://ai-memory" data-link>기억 관리</a>)', toggleHtml('ai.memoryEnabled', a.memoryEnabled !== false))

      const PERM_COLS = [
        { key: 'media', label: '카메라·마이크' },

        { key: 'notifications', label: '알림' },

      function permSelect(origin, key, cur) {
        const opt = (v, l) => '<option value="' + v + '"' + (v === (cur || 'default') ? ' selected' : '') + '>' + l + '</option>'
        return '<select data-perm="' + escape(origin) + '|' + key + '" style="font-size:12px;">'
          + opt('default', '기본') + opt('allow', '허용') + opt('deny', '차단') + '</select>'
      }
      function permissions() {
        let h = '<h2>사이트 권한</h2>'
          + '<div class="section"><div class="info-line">사이트별로 카메라·마이크·위치·알림·클립보드 권한을 허용/차단합니다. "기본"은 표준 동작(대부분 요청 시 허용)을 따릅니다. 설정한 사이트만 여기에 표시됩니다.</div></div>'
        if (!permissionList || permissionList.length === 0) {
          h += '<div class="section"><div class="sidepanel-empty" style="padding:24px;color:var(--muted);font-size:13px;">아직 사이트별 권한 설정이 없습니다.</div></div>'
          return h
        }
        h += '<div class="section"><table class="perm-table"><thead><tr><th>사이트</th>'
          + PERM_COLS.map((c) => '<th>' + c.label + '</th>').join('')
          + '<th></th></tr></thead><tbody>'
        for (const { origin, permissions: perms } of permissionList) {
          h += '<tr><td class="perm-origin">' + escape(origin) + '</td>'
            + PERM_COLS.map((c) => '<td>' + permSelect(origin, c.key, perms[c.key]) + '</td>').join('')
            + '<td><button class="btn" data-perm-clear="' + escape(origin) + '">삭제</button></td></tr>'
        }
        h += '</tbody></table>'
          + '<div style="margin-top:12px;"><button class="btn" id="perm-clear-all">전체 초기화</button></div></div>'
        return h
      }

      async function bindPermissions() {
        const refresh = async () => {
          try { permissionList = (await window.internalAPI.permissions.list()) || [] } catch { permissionList = [] }
          render()
        }
        document.querySelectorAll('[data-perm]').forEach((el) => {
          el.addEventListener('change', async () => {
            const [origin, perm] = el.dataset.perm.split('|')
            await window.internalAPI.permissions.set(origin, perm, el.value)
            await refresh()
          })
        })
        document.querySelectorAll('[data-perm-clear]').forEach((el) => {
          el.addEventListener('click', async () => {
            await window.internalAPI.permissions.clearOrigin(el.dataset.permClear)
            await refresh()
          })
        })
        const clearAll = document.getElementById('perm-clear-all')
        if (clearAll) clearAll.addEventListener('click', async () => {
          if (!confirm('모든 사이트의 권한 설정을 초기화할까요?')) return
          await window.internalAPI.permissions.clearAll()
          await refresh()
        })
      }

      function inputToAccel(e) {
        const parts = []
        if (e.ctrlKey) parts.push('Ctrl')
        if (e.shiftKey) parts.push('Shift')
        if (e.altKey) parts.push('Alt')
        if (e.metaKey) parts.push('Cmd')
        let key = e.key
        if (key === 'Control' || key === 'Shift' || key === 'Alt' || key === 'Meta') return null
        if (key === ' ') key = 'Space'
        if (key.length === 1) key = key.toUpperCase()
        // ArrowLeft/Right/Up/Down → Left/Right/Up/Down
        if (key.startsWith('Arrow')) key = key.slice(5)
        parts.push(key)
        return parts.join('+')
      }

      function bindKeymap() {
        const addBtn = document.getElementById('km-add')
        const resetBtn = document.getElementById('km-reset')
        if (addBtn) {
          addBtn.addEventListener('click', async () => {
            const next = { ...keymapData.keymap, bindings: [...keymapData.keymap.bindings, { action: 'action.', key: '', when: 'global' }] }
            const r = await window.internalAPI.keymap.set(next)
            keymapData = r
            render()
          })
        }
        if (resetBtn) {
          resetBtn.addEventListener('click', async () => {
            if (!confirm('모든 단축키를 기본값으로 되돌릴까요?')) return
            const r = await window.internalAPI.keymap.reset()
            keymapData = r
            render()
          })
        }

        document.querySelectorAll('[data-km-action]').forEach((el) => {
          el.addEventListener('change', async () => {
            const idx = parseInt(el.dataset.kmAction, 10)
            const next = JSON.parse(JSON.stringify(keymapData.keymap))
            if (next.bindings[idx]) next.bindings[idx].action = el.value.trim()
            const r = await window.internalAPI.keymap.set(next)
            keymapData = r
            render()
          })
        })

        document.querySelectorAll('[data-km-key]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.kmKey, 10)
            btn.textContent = '키를 누르세요…'
            btn.classList.add('capturing')
            const handler = async (e) => {
              e.preventDefault()
              e.stopPropagation()
              if (e.key === 'Escape') {
                window.removeEventListener('keydown', handler, true)
                render()
                return
              }
              const accel = inputToAccel(e)
              if (!accel) return  // modifier 단독은 무시
              window.removeEventListener('keydown', handler, true)
              const next = JSON.parse(JSON.stringify(keymapData.keymap))
              if (next.bindings[idx]) next.bindings[idx].key = accel
              const r = await window.internalAPI.keymap.set(next)
              keymapData = r
              render()
            }
            window.addEventListener('keydown', handler, true)
          })
        })

        document.querySelectorAll('[data-km-when]').forEach((sel) => {
          sel.addEventListener('change', async () => {
            const idx = parseInt(sel.dataset.kmWhen, 10)
            const next = JSON.parse(JSON.stringify(keymapData.keymap))
            if (next.bindings[idx]) next.bindings[idx].when = sel.value
            const r = await window.internalAPI.keymap.set(next)
            keymapData = r
            render()
          })
        })

        document.querySelectorAll('[data-km-remove]').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const idx = parseInt(btn.dataset.kmRemove, 10)
            const next = JSON.parse(JSON.stringify(keymapData.keymap))
            next.bindings.splice(idx, 1)
            const r = await window.internalAPI.keymap.set(next)
            keymapData = r
            render()
          })
        })
      }

      const UPDATE_STATE_LABEL = {
        idle: '대기', checking: '확인 중…', available: '새 버전 있음',

      }
      function renderUpdateStatus(s) {
        const statusEl = document.getElementById('update-status')
        const installBtn = document.getElementById('update-install')
        if (!statusEl) return
        const label = UPDATE_STATE_LABEL[s.state] || s.state
        let txt = '현재 v' + (s.current || '?') + ' · ' + label
        if (s.state === 'available' && s.available) txt += ' (v' + s.available + ')'
        if (s.state === 'downloading' && typeof s.progress === 'number') txt += ' ' + Math.round(s.progress * 100) + '%'
        if (s.state === 'error' && s.error) txt += ' — ' + s.error
        statusEl.textContent = txt
        if (installBtn) installBtn.style.display = s.state === 'downloaded' ? '' : 'none'
      }

      function bindUpdate() {
        if (!window.internalAPI.update) return
        window.internalAPI.update.status().then(renderUpdateStatus).catch(() => {})
        const checkBtn = document.getElementById('update-check')
        if (checkBtn) {
          checkBtn.addEventListener('click', async () => {
            checkBtn.disabled = true
            try { renderUpdateStatus(await window.internalAPI.update.check()) }
            finally { setTimeout(() => { checkBtn.disabled = false }, 1500) }
          })
        }
        const installBtn = document.getElementById('update-install')
        if (installBtn) installBtn.addEventListener('click', () => window.internalAPI.update.install())
        // 채널 변경은 즉시 적용(setChannel = 영속 + 런타임 반영). data-select 의 settings.set 과 더해도 무해.
        const channelSel = document.querySelector('[data-select="update.channel"]')
        if (channelSel) channelSel.addEventListener('change', () => window.internalAPI.update.setChannel(channelSel.value))
      }

      function row(label, desc, control) {
        return '<div class="row"><div><div class="label">' + label + '</div>'
          + (desc ? '<div class="desc">' + desc + '</div>' : '')
          + '</div><div class="control">' + control + '</div></div>'
      }

      function bind() {
        document.querySelectorAll('[data-toggle]').forEach((el) => {
          el.addEventListener('click', async () => {
            const key = el.dataset.toggle
            const next = !el.classList.contains('on')
            el.classList.toggle('on', next)
            await window.internalAPI.settings.set(key, next)
          })
        })
        document.querySelectorAll('[data-select]').forEach((el) => {
          el.addEventListener('change', async () => {
            await window.internalAPI.settings.set(el.dataset.select, el.value)
          })
        })
        document.querySelectorAll('[data-input]').forEach((el) => {
          el.addEventListener('change', async () => {
            const key = el.dataset.input
            const v = el.type === 'number' ? parseFloat(el.value) : el.value
            await window.internalAPI.settings.set(key, v)
          })
        })
        document.querySelectorAll('[data-link]').forEach((el) => {
          el.addEventListener('click', (e) => {
            e.preventDefault()
            window.internalAPI.navigate(el.getAttribute('href'))
          })
        })

        // 워크스페이스 카드 핸들러
        const newBtn = document.getElementById('ws-new')
        if (newBtn) {
          newBtn.addEventListener('click', async () => { await window.internalAPI.workspace.create() })
        }
        document.querySelectorAll('[data-ws-remove]').forEach((el) => {
          el.addEventListener('click', async () => {
            const id = el.dataset.wsRemove
            const ws = workspaces.find((w) => w.id === id)
            if (!ws) return
            if (!confirm('"' + ws.name + '" 워크스페이스를 삭제할까요?\n(이 스페이스의 모든 탭과 세션이 사라집니다.)')) return
            await window.internalAPI.workspace.remove(id)
          })
        })
        document.querySelectorAll('[data-ws-name]').forEach((el) => {
          el.addEventListener('change', async () => {
            await window.internalAPI.workspace.update(el.dataset.wsName, { name: el.value })
          })
        })
        document.querySelectorAll('[data-ws-home]').forEach((el) => {
          el.addEventListener('change', async () => {
            await window.internalAPI.workspace.update(el.dataset.wsHome, { homeUrl: el.value })
          })
        })
        document.querySelectorAll('[data-ws-color]').forEach((el) => {
          el.addEventListener('click', async () => {
            const parts = el.dataset.wsColor.split('::')
            await window.internalAPI.workspace.update(parts[0], { color: parts[1] })
          })
        })

        if (currentCat === 'keymap') bindKeymap()
        if (currentCat === 'design') bindDesign()
        if (currentCat === 'data') bindData()
        if (currentCat === 'update') bindUpdate()
        if (currentCat === 'widgets') bindWidgets()
        if (currentCat === 'appearance') bindStartup()
        if (currentCat === 'permissions') bindPermissions()
        if (currentCat === 'downloads') bindDownloads()
        if (currentCat === 'ai') bindAi()
      }

      function bindAi() {
        // 제공자 변경 시 즉시 재렌더 (해당 제공자 모델·키 UI 노출)
        const provSel = document.querySelector('[data-select="ai.provider"]')
        if (provSel) provSel.addEventListener('change', () => {
          settings.ai = settings.ai || {}
          settings.ai.provider = provSel.value
          render()
        })
        ;['anthropic', 'openai', 'google'].forEach((p) => {
          const saveBtn = document.getElementById('ai-key-save-' + p)
          const input = document.getElementById('ai-key-input-' + p)
          if (saveBtn && input) {
            saveBtn.addEventListener('click', async () => {
              const key = input.value.trim()
              if (!key) return
              const r = await window.internalAPI.ai.setKey(p, key)
              if (r && r.status) aiKeyStatus = r.status
              input.value = ''
              render()
            })
          }
          const clearBtn = document.getElementById('ai-key-clear-' + p)
          if (clearBtn) {
            clearBtn.addEventListener('click', async () => {
              if (!confirm('저장된 API 키를 삭제할까요?')) return
              const r = await window.internalAPI.ai.clearKey(p)
              if (r && r.status) aiKeyStatus = r.status
              render()
            })
          }
        })

        // 에이전트 자료 폴더
        const infoEl = document.getElementById('agentDirInfo')
        function showDirInfo(info) {
          if (!infoEl) return
          if (!info || !info.dir) { infoEl.textContent = ''; return }
          const list = (info.files || []).slice(0, 8).join(', ')
          infoEl.textContent = info.count + '개 파일' + (info.count === 0 ? ' (비어 있음 — 파일을 넣어주세요)' : (list ? ' — ' + list + (info.count > 8 ? ' …' : '') : ''))
        }
        if (infoEl && window.internalAPI.ai && window.internalAPI.ai.agentFilesInfo) {
          window.internalAPI.ai.agentFilesInfo().then(showDirInfo).catch(() => {})
        }
        const dirPick = document.getElementById('agentDirPick')
        if (dirPick) dirPick.addEventListener('click', async () => {
          const r = await window.internalAPI.ai.pickAgentDir()
          if (!r || !r.ok) return
          settings.ai = settings.ai || {}
          settings.ai.agentFilesDir = r.dir
          render()
        })
        const dirClear = document.getElementById('agentDirClear')
        if (dirClear) dirClear.addEventListener('click', async () => {
          await window.internalAPI.settings.set('ai.agentFilesDir', '')
          settings.ai = settings.ai || {}
          settings.ai.agentFilesDir = ''
          render()
        })

        // AI 상태 점검
        const diagBtn = document.getElementById('aiDiagBtn')
        const diagBox = document.getElementById('aiDiagResult')
        if (diagBtn && diagBox && window.internalAPI.ai && window.internalAPI.ai.diagnose) {
          diagBtn.addEventListener('click', async () => {
            diagBtn.disabled = true
            const prev = diagBtn.textContent
            diagBtn.textContent = '점검 중…'
            diagBox.style.display = 'block'
            diagBox.className = 'ai-diag checking'
            diagBox.innerHTML = '<div class="ai-diag-msg">현재 제공자에 실제로 요청을 보내는 중…</div>'
            let r
            try { r = await window.internalAPI.ai.diagnose() } catch (e) { r = null }
            diagBtn.disabled = false
            diagBtn.textContent = prev
            if (!r) { diagBox.className = 'ai-diag bad'; diagBox.innerHTML = '<div class="ai-diag-msg">점검을 실행하지 못했습니다.</div>'; return }
            diagBox.className = 'ai-diag ' + (r.ok ? 'good' : 'bad')
            let h = '<div class="ai-diag-msg">' + (r.ok ? '✅ ' : '❌ ') + escape(r.message || '') + '</div>'
            h += '<div class="ai-diag-sub">' + escape(r.providerLabel || '') + (r.model ? ' · ' + escape(r.model) : '') + '</div>'
            if (r.fix) h += '<div class="ai-diag-fix">💡 ' + escape(r.fix) + '</div>'
            if (r.detail && !r.ok) h += '<div class="ai-diag-detail">' + escape(r.detail) + '</div>'
            // 설치된 모델로 즉시 전환(ollama 모델 미설치 시)
            if (Array.isArray(r.installedModels) && r.installedModels.length) {
              h += '<div class="ai-diag-models"><span class="ai-diag-sub">설치된 모델:</span> '
              h += r.installedModels.map((m) => '<button class="btn ai-diag-swap" type="button" data-model="' + escape(m) + '">' + escape(m) + '</button>').join(' ')
              h += '</div>'
            }
            diagBox.innerHTML = h
            diagBox.querySelectorAll('.ai-diag-swap').forEach((b) => {
              b.addEventListener('click', async () => {
                const m = b.getAttribute('data-model')
                await window.internalAPI.settings.set('ai.ollamaModel', m)
                settings.ai = settings.ai || {}
                settings.ai.ollamaModel = m
                diagBtn.click() // 전환 후 자동 재점검
              })
            })
          })
        }
      }

      function bindDownloads() {
        const pickBtn = document.getElementById('downloads-pick-folder')
        if (pickBtn) pickBtn.addEventListener('click', async () => {
          const r = await window.internalAPI.downloads.pickFolder()
          if (r.canceled || !r.path) return
          settings.downloads = settings.downloads || {}
          settings.downloads.defaultPath = r.path
          await window.internalAPI.settings.set('downloads.defaultPath', r.path)
          render()
        })
      }

      function bindStartup() {
        // 시작 모드 전환 시 URL 목록 textarea 표시/숨김 위해 즉시 재렌더
        const modeSel = document.querySelector('[data-select="startup.mode"]')
        if (modeSel) modeSel.addEventListener('change', () => {
          settings.startup = settings.startup || {}
          settings.startup.mode = modeSel.value
          render()
        })
        const urlsArea = document.getElementById('startup-urls')
        if (urlsArea) urlsArea.addEventListener('change', async () => {
          const urls = urlsArea.value.split('\n').map((s) => s.trim()).filter(Boolean)
          settings.startup = settings.startup || {}
          settings.startup.urls = urls
          await window.internalAPI.settings.set('startup.urls', urls)
        })
      }

      function bindWidgets() {
        // 위치 모드 전환 시 수동 좌표 입력 표시/숨김을 위해 즉시 재렌더
        const modeSel = document.querySelector('[data-select="widgets.locationMode"]')
        if (modeSel) modeSel.addEventListener('change', () => {
          settings.widgets = settings.widgets || {}
          settings.widgets.locationMode = modeSel.value
          render()
        })
      }

      function bindDesign() {
        async function setVal(key, value) {
          await window.internalAPI.tokens.set(key, value)
          tokensData = await window.internalAPI.tokens.get()
          render()
        }
        document.querySelectorAll('[data-token-color]').forEach((el) => {
          el.addEventListener('change', () => setVal(el.dataset.tokenColor, el.value))
        })
        document.querySelectorAll('[data-token-text]').forEach((el) => {
          el.addEventListener('change', () => setVal(el.dataset.tokenText, el.value))
        })
        document.querySelectorAll('[data-token-reset]').forEach((el) => {
          el.addEventListener('click', () => setVal(el.dataset.tokenReset, ''))
        })
        const allReset = document.getElementById('token-reset-all')
        if (allReset) {
          allReset.addEventListener('click', async () => {
            if (!confirm('모든 디자인 토큰을 기본값으로 되돌릴까요?')) return
            await window.internalAPI.tokens.reset()
            tokensData = await window.internalAPI.tokens.get()
            render()
          })
        }
      }

      function bindData() {
        const exportBtn = document.getElementById('data-export')
        const importBtn = document.getElementById('data-import')
        if (exportBtn) {
          exportBtn.addEventListener('click', async () => {
            const bundle = await window.internalAPI.data.export()
            const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' })
            const a = document.createElement('a')
            const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19)
            a.href = URL.createObjectURL(blob)
            a.download = 'browserbuild-data-' + ts + '.json'
            document.body.appendChild(a); a.click(); a.remove()
            setTimeout(() => URL.revokeObjectURL(a.href), 1000)
          })
        }
        if (importBtn) {
          importBtn.addEventListener('click', async () => {
            const input = document.createElement('input')
            input.type = 'file'
            input.accept = 'application/json,.json'
            input.addEventListener('change', async () => {
              const file = input.files?.[0]
              if (!file) return
              try {
                const text = await file.text()
                const bundle = JSON.parse(text)
                if (!confirm('가져오기를 진행하면 기존 데이터의 일부가 덮어쓰입니다. 계속할까요?\n\n(앱 재시작 권장)')) return
                const r = await window.internalAPI.data.import(bundle)
                if (r.ok) {
                  alert('복원 완료: ' + r.restored + '개 항목' + (r.errors.length ? '\n오류 ' + r.errors.length + '건' : ''))
                } else {
                  alert('가져오기 실패\n' + r.errors.join('\n'))
                }
              } catch (e) {
                alert('JSON 파싱 실패: ' + (e && e.message ? e.message : e))
              }
            })
            input.click()
          })
        }
        const scanBtn = document.getElementById('browser-import-scan')
        if (scanBtn) {
          scanBtn.addEventListener('click', async () => {
            const listEl = document.getElementById('browser-import-list')
            listEl.innerHTML = '<div class="info-line">설치된 브라우저를 찾는 중…</div>'
            let sources = []
            try { sources = await window.internalAPI.importer.sources() } catch (e) { sources = [] }
            if (!sources.length) {
              listEl.innerHTML = '<div class="info-line">가져올 수 있는 브라우저(크롬·엣지·Brave·웨일)를 찾지 못했습니다.</div>'
              return
            }
            listEl.innerHTML = '<div class="info-line" style="margin-bottom:6px;">가져올 프로필을 선택하세요:</div>'
            for (const s of sources) {
              const tags = [s.hasBookmarks ? '북마크' : null, s.hasHistory ? '기록' : null].filter(Boolean).join('·')
              const btn = document.createElement('button')
              btn.className = 'btn'
              btn.style.marginRight = '6px'
              btn.style.marginBottom = '6px'
              btn.textContent = s.browser + ' (' + s.profile + ') · ' + tags
              btn.addEventListener('click', async () => {
                const resEl = document.getElementById('browser-import-result')
                resEl.textContent = '가져오는 중…'
                try {
                  const r = await window.internalAPI.importer.run(s.id, { bookmarks: s.hasBookmarks, history: s.hasHistory })
                  if (r.errors && r.errors.length && !r.bookmarks && !r.history) {
                    resEl.textContent = '⚠ ' + r.errors.join(' ')
                  } else {
                    resEl.textContent = '✓ 북마크 ' + r.bookmarks + '개, 방문 기록 ' + r.history + '개를 가져왔습니다.'
                      + (r.errors && r.errors.length ? (' ' + r.errors.join(' ')) : '')
                  }
                } catch (e) {
                  resEl.textContent = '가져오기 실패: ' + (e && e.message ? e.message : e)
                }
              })
              listEl.appendChild(btn)
            }
          })
        }
      }

      // 외부 변경 구독
      if (window.internalAPI) {
        window.internalAPI.settings.onChange(async (s) => { settings = s; render() })
        window.internalAPI.workspace.onChanged(async (st) => {
          workspaces = st.workspaces; activeWorkspaceId = st.activeId; render()
        })
        window.internalAPI.tokens.onChanged(async () => {
          tokensData = await window.internalAPI.tokens.get()
          if (currentCat === 'design') render()
        })
        if (window.internalAPI.permissions) {
          window.internalAPI.permissions.onChanged((list) => {
            permissionList = list || []
            if (currentCat === 'permissions') render()
          })
        }
        if (window.internalAPI.update) {
          window.internalAPI.update.onStatus((s) => { if (currentCat === 'update') renderUpdateStatus(s) })
        }
      }
      reload()
    </script>
  </body>
</html>
