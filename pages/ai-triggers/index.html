<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>AI 트리거</title>
<style>
  :root { color-scheme: light dark; --bg:#fff; --fg:#1a1a1a; --muted:#666; --border:#e2e2e2; --card:#fafafa; --accent:#3b6fd4; }
  @media (prefers-color-scheme: dark){ :root{ --bg:#1e1e1e; --fg:#eaeaea; --muted:#9a9a9a; --border:#3a3a3a; --card:#262626; --accent:#5b8def; } }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--fg); font-size:14px; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 24px 18px 60px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 18px; font-size: 13px; }
  .card { border:1px solid var(--border); border-radius:10px; background:var(--card); padding:14px; margin-bottom:12px; }
  .row { display:flex; align-items:center; gap:8px; }
  .row.between { justify-content: space-between; }
  label { display:block; font-size:12px; color:var(--muted); margin:8px 0 3px; }
  input[type=text], textarea, select { width:100%; padding:7px 9px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--fg); font-size:13px; font-family:inherit; }
  textarea { resize:vertical; min-height:52px; }
  .chip { font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid var(--border); color:var(--muted); }
  .chip.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  button { padding:7px 12px; border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--fg); cursor:pointer; font-size:13px; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.danger { color:#c0392b; }
  .tname { font-weight:600; }
  .tmeta { font-size:12px; color:var(--muted); margin-top:3px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .inline { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
  .hidden { display:none; }
  .empty { color:var(--muted); text-align:center; padding:30px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🤖 AI 트리거</h1>
  <p class="sub">브라우저가 스스로 일합니다 — 사이트에 들어가면 · 매일 정해진 시각에 · 페이지 내용이 바뀌면 자동으로 작업을 실행합니다. 재시작해도 유지됩니다.</p>

  <div class="card">
    <div class="row between"><b>＋ 새 트리거</b></div>
    <label>이름</label>
    <input type="text" id="f-name" placeholder="예: 회사 메일 자동 로그인">
    <label>종류</label>
    <select id="f-type">
      <option value="url">사이트 진입 시 (URL 패턴)</option>
      <option value="daily">매일 정해진 시각</option>
      <option value="watch">페이지 변경 감지</option>
    </select>

    <div id="fields-url">
      <label>URL 패턴 (와일드카드 * 사용, 예: https://mail.google.com/*)</label>
      <input type="text" id="f-urlpattern" placeholder="https://example.com/*">
    </div>
    <div id="fields-daily" class="hidden">
      <div class="grid2">
        <div><label>시각 (HH:MM, 24시간)</label><input type="text" id="f-time" placeholder="09:00"></div>
        <div><label>열 페이지 URL (선택)</label><input type="text" id="f-openurl-d" placeholder="https://news.example.com"></div>
      </div>
    </div>
    <div id="fields-watch" class="hidden">
      <label>확인할 페이지 URL</label>
      <input type="text" id="f-openurl-w" placeholder="https://example.com/page">
      <div class="grid2">
        <div><label>확인할 요소 CSS 선택자 (선택, 없으면 본문 전체)</label><input type="text" id="f-selector" placeholder=".price, #status"></div>
        <div><label>확인 주기 (분)</label><input type="text" id="f-interval" placeholder="10"></div>
      </div>
      <label class="inline"><input type="checkbox" id="f-runonchange"> 변경 시 아래 작업도 실행</label>
    </div>

    <label>작업 지시 (에이전트가 수행할 일)</label>
    <textarea id="f-task" placeholder="예: 로그인 폼을 찾아 저장된 계정으로 로그인해줘."></textarea>
    <div class="row" style="margin-top:8px; gap:14px;">
      <label class="inline"><input type="checkbox" id="f-notify" checked> 완료/변경 시 알림</label>
      <label class="inline"><input type="checkbox" id="f-auto"> 무인 자동 승인 ⚠</label>
      <span style="flex:1"></span>
      <button class="primary" id="btn-add">추가</button>
    </div>
  </div>

  <div id="list"></div>
</div>

<script>
  var api = window.internalAPI && window.internalAPI.ai;
  var TYPE_LABEL = { url: '사이트 진입', daily: '매일', watch: '변경 감지' };
  function el(id){ return document.getElementById(id); }
  function showTypeFields(){
    var t = el('f-type').value;
    el('fields-url').classList.toggle('hidden', t !== 'url');
    el('fields-daily').classList.toggle('hidden', t !== 'daily');
    el('fields-watch').classList.toggle('hidden', t !== 'watch');
  }
  el('f-type').addEventListener('change', showTypeFields);

  function summary(t){
    if (t.type === 'url') return 'URL: ' + (t.urlPattern || '(미설정)');
    if (t.type === 'daily') return '매일 ' + (t.time || '??:??') + (t.openUrl ? ' · ' + t.openUrl : '');
    if (t.type === 'watch') return (t.openUrl || '(URL 미설정)') + ' · ' + (t.intervalMinutes || 10) + '분마다' + (t.selector ? ' · ' + t.selector : '');
    return '';
  }
  function render(list){
    var box = el('list');
    box.innerHTML = '';
    if (!list || !list.length){ box.innerHTML = '<div class="empty">아직 트리거가 없습니다. 위에서 추가하세요.</div>'; return; }
    list.forEach(function(t){
      var card = document.createElement('div'); card.className = 'card';
      var head = document.createElement('div'); head.className = 'row between';
      var left = document.createElement('div');
      left.innerHTML = '<div class="tname">' + escapeHtml(t.name) + ' <span class="chip">' + TYPE_LABEL[t.type] + '</span></div>' +
        '<div class="tmeta">' + escapeHtml(summary(t)) + '</div>' +
        '<div class="tmeta">작업: ' + escapeHtml((t.task||'').slice(0,80)) + '</div>' +
        (t.lastResult ? '<div class="tmeta">최근: ' + escapeHtml(t.lastResult.slice(0,80)) + '</div>' : '');
      var right = document.createElement('div'); right.className = 'row';
      var toggle = document.createElement('button'); toggle.className = 'chip' + (t.enabled ? ' on' : ''); toggle.textContent = t.enabled ? '켜짐' : '꺼짐';
      toggle.onclick = function(){ api.triggerSetEnabled(t.id, !t.enabled); };
      var del = document.createElement('button'); del.className = 'danger'; del.textContent = '삭제';
      del.onclick = function(){ if (confirm('이 트리거를 삭제할까요?')) api.triggerRemove(t.id); };
      right.appendChild(toggle); right.appendChild(del);
      head.appendChild(left); head.appendChild(right);
      card.appendChild(head);
      box.appendChild(card);
    });
  }
  function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  el('btn-add').addEventListener('click', function(){
    var type = el('f-type').value;
    var p = {
      name: el('f-name').value.trim() || '트리거',
      type: type,
      task: el('f-task').value.trim(),
      notify: el('f-notify').checked,
      autoConfirm: el('f-auto').checked,
      enabled: true,
    };
    if (type === 'url') p.urlPattern = el('f-urlpattern').value.trim();
    if (type === 'daily'){ p.time = el('f-time').value.trim(); p.openUrl = el('f-openurl-d').value.trim(); }
    if (type === 'watch'){ p.openUrl = el('f-openurl-w').value.trim(); p.selector = el('f-selector').value.trim(); p.intervalMinutes = parseInt(el('f-interval').value,10) || 10; p.runOnChange = el('f-runonchange').checked; }
    if (!p.task){ alert('작업 지시를 입력하세요.'); return; }
    if (type === 'url' && !p.urlPattern){ alert('URL 패턴을 입력하세요.'); return; }
    if (type === 'daily' && !/^\d{1,2}:\d{2}$/.test(p.time||'')){ alert('시각을 HH:MM 형식으로 입력하세요.'); return; }
    if (type === 'watch' && !p.openUrl){ alert('확인할 페이지 URL 을 입력하세요.'); return; }
    api.triggerAdd(p);
    el('f-name').value=''; el('f-task').value=''; el('f-urlpattern').value=''; el('f-time').value=''; el('f-openurl-d').value=''; el('f-openurl-w').value=''; el('f-selector').value=''; el('f-interval').value='';
  });

  function reload(){ if (api && api.triggerList) api.triggerList().then(render); }
  if (api && api.onTriggerChanged) api.onTriggerChanged(render);
  showTypeFields();
  reload();
</script>
</body>
</html>
