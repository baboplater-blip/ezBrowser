<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" />
    <title>방문 기록</title>
    <style>
      :root { color-scheme: light dark; --bg: #F7F7F8; --fg: #1A1A1A; --muted: #5F5F66; --card: #FFFFFF; --border: #E5E5E8; --accent: #3478F6; }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0F0F12; --fg: #F2F2F5; --muted: #9B9BA3; --card: #1A1A1F; --border: #2A2A30; --accent: #5A93F9; }
      }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
      .wrap { max-width: 920px; margin: 0 auto; padding: 32px 24px; }
      h1 { font-size: 24px; margin: 0 0 16px; }
      .bar { display: flex; gap: 12px; margin-bottom: 18px; }
      input.q { flex: 1; height: 36px; padding: 0 14px; border: 1px solid var(--border); border-radius: 18px; background: var(--card); color: inherit; font-size: 13px; outline: none; }
      input.q:focus { border-color: var(--accent); }
      button.btn { height: 36px; padding: 0 14px; border-radius: 18px; border: 1px solid var(--border); background: var(--card); color: inherit; cursor: pointer; font-size: 12px; }
      button.btn:hover { border-color: var(--accent); color: var(--accent); }
      .group { margin-bottom: 22px; }
      .group h2 { font-size: 12px; color: var(--muted); margin: 0 0 8px 4px; text-transform: uppercase; letter-spacing: 0.5px; }
      .row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-bottom: 1px solid var(--border); }
      .row .fav { width: 16px; height: 16px; flex: 0 0 16px; opacity: 0.8; }
      .row a { flex: 1; color: inherit; text-decoration: none; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 13px; }
      .row .url { color: var(--muted); font-size: 11px; margin-left: 8px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 45%; }
      .row .time { color: var(--muted); font-size: 11px; margin-left: 8px; flex: 0 0 auto; }
      .row .rm { background: transparent; border: none; color: var(--muted); cursor: pointer; opacity: 0; }
      .row:hover .rm { opacity: 1; }
      .row .rm:hover { color: #C82A38; }
      .empty { padding: 64px 0; text-align: center; color: var(--muted); }
      .empty-illust { display: block; width: 200px; max-width: 55%; margin: 0 auto 14px; opacity: .92; }
    
      /* ===== Emil 모션 폴리시 (emilkowalski/skills · emil-design-eng) ===== */
      button:not(.toggle):not(:disabled) { transition: transform 0.12s cubic-bezier(0.23, 1, 0.32, 1); }
      button:not(.toggle):not(:disabled):active { transform: scale(0.97); }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>방문 기록</h1>
      <div class="bar">
        <input id="q" class="q" placeholder="이력 검색 (제목·URL)" autofocus />
        <button class="btn" id="clear-day">오늘 삭제</button>
        <button class="btn" id="clear-all">전체 삭제</button>
      </div>
      <div id="list"></div>
    </div>
    <script>
      const list = document.getElementById('list')
      const q = document.getElementById('q')
      const dayBtn = document.getElementById('clear-day')
      const allBtn = document.getElementById('clear-all')

      function favicon(u) { try { return `https://www.google.com/s2/favicons?domain=${new URL(u).hostname}&sz=32` } catch { return '' } }
      function relTime(ts) {
        const d = new Date(ts)
        const today = new Date()
        const sameDay = d.toDateString() === today.toDateString()
        if (sameDay) return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
        return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' })
      }
      function groupByDay(entries) {
        const groups = new Map()
        for (const e of entries) {
          const key = new Date(e.lastVisitAt).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' })
          if (!groups.has(key)) groups.set(key, [])
          groups.get(key).push(e)
        }
        return groups
      }

      function render(entries) {
        if (!entries || entries.length === 0) {
          list.innerHTML = '<div class="empty"><img class="empty-illust" src="empty.png" alt="">방문 기록이 비어 있습니다.</div>'
          return
        }
        const groups = groupByDay(entries)
        let html = ''
        for (const [day, items] of groups) {
          html += `<div class="group"><h2>${day}</h2>`
          for (const e of items) {
            const title = (e.title || e.url).replace(/</g, '&lt;')
            html += `<div class="row" data-id="${e.id}">
              <img class="fav" src="${favicon(e.url)}" alt="" />
              <a href="${e.url}">${title}</a>
              <span class="url">${e.url.replace(/</g, '&lt;')}</span>
              <span class="time">${relTime(e.lastVisitAt)}</span>
              <button class="rm" title="이 항목 삭제">×</button>
            </div>`
          }
          html += '</div>'
        }
        list.innerHTML = html
        list.querySelectorAll('.rm').forEach((btn) => {
          btn.addEventListener('click', async (ev) => {
            const row = ev.currentTarget.closest('.row')
            const id = Number(row.dataset.id)
            await window.internalAPI.history.remove({ id })
          })
        })
      }

      let timer = null
      async function load() {
        if (!window.internalAPI) { list.innerHTML = '<div class="empty">internalAPI 미주입</div>'; return }
        const query = q.value.trim()
        const entries = query
          ? await window.internalAPI.history.search(query, 200)
          : await window.internalAPI.history.recent(300)
        render(entries)
      }
      q.addEventListener('input', () => {
        if (timer) clearTimeout(timer)
        timer = setTimeout(load, 120)
      })
      dayBtn.addEventListener('click', async () => {
        if (!confirm('오늘 방문 기록을 모두 삭제할까요?')) return
        const midnight = new Date(); midnight.setHours(0, 0, 0, 0)
        const sinceMs = Date.now() - midnight.getTime()
        await window.internalAPI.history.clear({ sinceMs })
      })
      allBtn.addEventListener('click', async () => {
        if (!confirm('전체 방문 기록을 삭제할까요? 되돌릴 수 없습니다.')) return
        await window.internalAPI.history.clear()
      })
      if (window.internalAPI) {
        window.internalAPI.history.onChanged(() => load())
      }
      load()
    </script>
  </body>
</html>
