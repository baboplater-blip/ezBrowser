<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" />
    <title>북마크</title>
    <style>
      :root { color-scheme: light dark;
        --bg: #F7F7F8; --fg: #1A1A1A; --muted: #5F5F66;
        --card: #FFFFFF; --border: #E5E5E8; --accent: #3478F6;
        --hover: #EDEDEF; --selected: #DCE7FB;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0F0F12; --fg: #F2F2F5; --muted: #9B9BA3;
          --card: #1A1A1F; --border: #2A2A30; --accent: #5A93F9;
          --hover: #25252C; --selected: #1F3358; }
      }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
      .wrap { display: flex; flex-direction: column; height: 100%; }
      header { padding: 20px 24px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      header h1 { font-size: 20px; margin: 0; flex: 1; min-width: 120px; }
      input.q { width: 260px; height: 30px; padding: 0 12px; border: 1px solid var(--border); border-radius: 15px; background: var(--card); color: inherit; font-size: 12px; outline: none; }
      input.q:focus { border-color: var(--accent); }
      button.btn { height: 30px; padding: 0 12px; border-radius: 15px; border: 1px solid var(--border); background: var(--card); color: inherit; cursor: pointer; font-size: 12px; }
      button.btn:hover { border-color: var(--accent); color: var(--accent); }
      button.btn.primary { background: var(--accent); color: white; border-color: transparent; }
      button.btn.primary:hover { color: white; opacity: 0.9; }

      main { flex: 1; display: flex; min-height: 0; }
      aside { width: 240px; border-right: 1px solid var(--border); padding: 12px 8px; overflow-y: auto; flex: 0 0 240px; }
      aside .tree-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px 8px; }
      .folder-node { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
      .folder-node:hover { background: var(--hover); }
      .folder-node.selected { background: var(--selected); color: var(--accent); }
      .folder-node.drop-target { outline: 2px solid var(--accent); outline-offset: -2px; }
      .folder-node .ic { font-size: 13px; }
      .folder-node .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .folder-node .count { font-size: 10px; color: var(--muted); }
      .folder-children { padding-left: 14px; }
      .folder-actions { display: flex; gap: 6px; margin: 12px 8px 0; flex-wrap: wrap; }
      .folder-actions button { font-size: 11px; padding: 0 8px; height: 24px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: inherit; cursor: pointer; }
      .folder-actions button:hover { border-color: var(--accent); color: var(--accent); }

      section.list { flex: 1; padding: 12px 24px; overflow-y: auto; min-width: 0; }
      .list-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
      .list-header h2 { font-size: 14px; margin: 0; flex: 1; }
      .list-header .meta { font-size: 11px; color: var(--muted); }
      .row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-bottom: 1px solid var(--border); cursor: grab; }
      .row.dragging { opacity: 0.4; }
      .row .fav { width: 16px; height: 16px; flex: 0 0 16px; opacity: 0.85; }
      .row a { flex: 1; color: inherit; text-decoration: none; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 13px; }
      .row .url { color: var(--muted); font-size: 11px; max-width: 45%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
      .row .row-actions { display: flex; gap: 4px; opacity: 0; }
      .row:hover .row-actions { opacity: 1; }
      .row-actions button { background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 2px 6px; font-size: 12px; border-radius: 4px; }
      .row-actions button:hover { background: var(--hover); color: var(--fg); }
      .row-actions button.rm:hover { color: #C82A38; }
      .empty { padding: 64px 0; text-align: center; color: var(--muted); }
      .empty-illust { display: block; width: 200px; max-width: 55%; margin: 0 auto 14px; opacity: .92; }

      /* 인라인 편집 */
      .row.editing { background: var(--selected); }
      .row.editing input { flex: 1; font-size: 13px; padding: 4px 8px; border: 1px solid var(--accent); border-radius: 4px; background: var(--card); color: inherit; outline: none; min-width: 0; }
      .row.editing .edit-fields { flex: 1; display: flex; flex-direction: column; gap: 4px; }
      .row.editing .edit-fields .url-input { font-size: 11px; color: var(--muted); }
      .row.editing .save { color: var(--accent); }
      .row.editing .cancel { color: var(--muted); }

      /* 모달 */
      .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
      .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-width: 360px; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
      .modal h3 { margin: 0 0 16px; font-size: 16px; }
      .modal label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
      .modal input, .modal select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: inherit; font-size: 13px; box-sizing: border-box; outline: none; }
      .modal input:focus, .modal select:focus { border-color: var(--accent); }
      .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
      .hidden { display: none !important; }
    
      /* ===== Emil 모션 폴리시 (emilkowalski/skills · emil-design-eng) ===== */
      button:not(.toggle):not(:disabled) { transition: transform 0.12s cubic-bezier(0.23, 1, 0.32, 1); }
      button:not(.toggle):not(:disabled):active { transform: scale(0.97); }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>북마크</h1>
        <input id="q" class="q" placeholder="제목·URL 검색" />
        <button class="btn primary" id="new-bookmark">+ 새 북마크</button>
        <button class="btn" id="btn-import">가져오기</button>
        <button class="btn" id="btn-export">내보내기</button>
      </header>
      <main>
        <aside>
          <div class="tree-title">폴더</div>
          <div id="tree"></div>
          <div class="folder-actions">
            <button id="new-folder">새 폴더</button>
            <button id="rename-folder">이름 변경</button>
            <button id="del-folder">폴더 삭제</button>
          </div>
        </aside>
        <section class="list">
          <div class="list-header">
            <h2 id="current-name">모든 북마크</h2>
            <span class="meta" id="current-count">0개</span>
          </div>
          <div id="rows"></div>
        </section>
      </main>
    </div>

    <!-- 새 북마크 모달 -->
    <div id="add-modal" class="modal-backdrop hidden">
      <div class="modal">
        <h3>새 북마크 추가</h3>
        <label>제목</label>
        <input id="add-title" type="text" placeholder="예: 위키백과" />
        <label>URL</label>
        <input id="add-url" type="url" placeholder="https://..." />
        <label>폴더</label>
        <select id="add-folder"></select>
        <div class="modal-actions">
          <button class="btn" id="add-cancel">취소</button>
          <button class="btn primary" id="add-save">추가</button>
        </div>
      </div>
    </div>

    <!-- 숨겨진 file input (가져오기) -->
    <input id="import-file" type="file" accept=".html,text/html" class="hidden" />

    <script>
      let tree = { folders: [], bookmarks: [] }
      let currentFolderId = null  // null = 루트
      let query = ''
      let editingId = null  // 인라인 편집 중인 북마크 id

      const treeEl = document.getElementById('tree')
      const rowsEl = document.getElementById('rows')
      const qEl = document.getElementById('q')
      const titleEl = document.getElementById('current-name')
      const countEl = document.getElementById('current-count')

      function favicon(u) { try { return `https://www.google.com/s2/favicons?domain=${new URL(u).hostname}&sz=32` } catch { return '' } }
      function escape(s) { return String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }

      function bookmarksOfFolder(folderId) {
        return tree.bookmarks.filter((b) => (b.folderId ?? null) === folderId)
                              .sort((a, b) => a.position - b.position)
      }
      function subfoldersOf(folderId) {
        return tree.folders.filter((f) => (f.parentId ?? null) === folderId)
                            .sort((a, b) => a.position - b.position)
      }

      function buildTree() {
        const html = ['<div class="folder-children">']
        const rootCount = bookmarksOfFolder(null).length
        html.push(renderNode({ id: null, name: '모든 북마크', isRoot: true, count: rootCount }))
        for (const f of subfoldersOf(null)) html.push(renderTreeBranch(f))
        html.push('</div>')
        treeEl.innerHTML = html.join('')
        attachTreeHandlers()
      }
      function renderNode(info) {
        const sel = (info.id === currentFolderId) ? ' selected' : ''
        const ic = info.isRoot ? '★' : '📁'
        return `<div class="folder-node${sel}" data-folder-id="${info.id === null ? '' : info.id}">
          <span class="ic">${ic}</span>
          <span class="name">${escape(info.name)}</span>
          <span class="count">${info.count}</span>
        </div>`
      }
      function renderTreeBranch(folder) {
        const count = bookmarksOfFolder(folder.id).length
        const subs = subfoldersOf(folder.id)
        let html = renderNode({ id: folder.id, name: folder.name, count })
        if (subs.length > 0) {
          html += '<div class="folder-children">'
          for (const s of subs) html += renderTreeBranch(s)
          html += '</div>'
        }
        return html
      }

      function attachTreeHandlers() {
        treeEl.querySelectorAll('.folder-node').forEach((el) => {
          const fid = el.dataset.folderId === '' ? null : Number(el.dataset.folderId)
          el.addEventListener('click', () => {
            currentFolderId = fid
            buildTree(); renderRows()
          })
          el.addEventListener('dblclick', () => {
            if (fid === null) return
            void renameFolderById(fid)
          })
          el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('drop-target') })
          el.addEventListener('dragleave', () => el.classList.remove('drop-target'))
          el.addEventListener('drop', async (e) => {
            e.preventDefault()
            el.classList.remove('drop-target')
            const data = e.dataTransfer.getData('application/x-bookmark')
            if (!data) return
            const bookmarkId = Number(data)
            const folderId = fid
            const targets = bookmarksOfFolder(folderId)
            await window.internalAPI.bookmarks.move(bookmarkId, folderId, targets.length)
          })
        })
      }

      async function renameFolderById(fid) {
        const cur = tree.folders.find((f) => f.id === fid)
        if (!cur) return
        const name = prompt('새 폴더 이름', cur.name)
        if (!name || name === cur.name) return
        await window.internalAPI.bookmarks.folderRename(fid, name.trim())
      }

      function filterRows() {
        const list = currentFolderId === null
          ? tree.bookmarks  // 루트 보기: 전체
          : bookmarksOfFolder(currentFolderId)
        if (!query) return list
        const q = query.toLowerCase()
        return list.filter((b) => (b.title || '').toLowerCase().includes(q) || b.url.toLowerCase().includes(q))
      }

      function renderRows() {
        const list = filterRows()
        const folderName = currentFolderId === null
          ? '모든 북마크'
          : tree.folders.find((f) => f.id === currentFolderId)?.name ?? '폴더'
        titleEl.textContent = folderName
        countEl.textContent = `${list.length}개`
        if (list.length === 0) {
          rowsEl.innerHTML = '<div class="empty"><img class="empty-illust" src="empty.png" alt="">북마크가 없습니다.</div>'
          return
        }
        rowsEl.innerHTML = list.map((b) => {
          if (editingId === b.id) {
            return `<div class="row editing" data-id="${b.id}">
              <img class="fav" src="${favicon(b.url)}" alt="" />
              <div class="edit-fields">
                <input class="title-input" type="text" value="${escape(b.title || '')}" placeholder="제목" />
                <input class="url-input" type="url" value="${escape(b.url)}" placeholder="https://..." />
              </div>
              <div class="row-actions" style="opacity:1">
                <button class="save" title="저장">✓ 저장</button>
                <button class="cancel" title="취소">✕</button>
              </div>
            </div>`
          }
          return `<div class="row" draggable="true" data-id="${b.id}">
            <img class="fav" src="${favicon(b.url)}" alt="" />
            <a href="${b.url}">${escape(b.title || b.url)}</a>
            <span class="url">${escape(b.url)}</span>
            <div class="row-actions">
              <button class="edit" title="편집">✏</button>
              <button class="rm" title="제거">×</button>
            </div>
          </div>`
        }).join('')
        attachRowHandlers()
      }

      function attachRowHandlers() {
        rowsEl.querySelectorAll('.row').forEach((el) => {
          const id = Number(el.dataset.id)

          if (el.classList.contains('editing')) {
            const titleInput = el.querySelector('.title-input')
            const urlInput = el.querySelector('.url-input')
            titleInput.focus()
            titleInput.select()
            const saveFn = async () => {
              const title = titleInput.value.trim()
              const url = urlInput.value.trim()
              if (!url) return
              editingId = null
              await window.internalAPI.bookmarks.update(id, { title, url })
            }
            const cancelFn = () => { editingId = null; renderRows() }
            el.querySelector('.save').addEventListener('click', saveFn)
            el.querySelector('.cancel').addEventListener('click', cancelFn)
            const keyHandler = (e) => {
              if (e.key === 'Enter') { e.preventDefault(); void saveFn() }
              else if (e.key === 'Escape') { e.preventDefault(); cancelFn() }
            }
            titleInput.addEventListener('keydown', keyHandler)
            urlInput.addEventListener('keydown', keyHandler)
            return
          }

          el.addEventListener('dragstart', (e) => {
            el.classList.add('dragging')
            e.dataTransfer.setData('application/x-bookmark', String(id))
            e.dataTransfer.effectAllowed = 'move'
          })
          el.addEventListener('dragend', () => el.classList.remove('dragging'))
          el.querySelector('.edit').addEventListener('click', (ev) => {
            ev.preventDefault()
            editingId = id
            renderRows()
          })
          el.querySelector('.rm').addEventListener('click', async (ev) => {
            ev.preventDefault()
            if (!confirm('이 북마크를 삭제할까요?')) return
            await window.internalAPI.bookmarks.remove(id)
          })
        })
      }

      async function reload() {
        tree = await window.internalAPI.bookmarks.list()
        buildTree(); renderRows()
      }

      qEl.addEventListener('input', () => { query = qEl.value.trim(); renderRows() })

      document.getElementById('new-folder').addEventListener('click', async () => {
        const name = prompt('새 폴더 이름', '새 폴더')
        if (!name) return
        await window.internalAPI.bookmarks.folderCreate(name.trim(), currentFolderId)
      })
      document.getElementById('rename-folder').addEventListener('click', async () => {
        if (currentFolderId === null) { alert('루트는 이름을 변경할 수 없습니다. 폴더를 선택하세요.'); return }
        await renameFolderById(currentFolderId)
      })
      document.getElementById('del-folder').addEventListener('click', async () => {
        if (currentFolderId === null) { alert('루트는 삭제할 수 없습니다.'); return }
        if (!confirm('폴더와 안의 모든 북마크를 삭제할까요?')) return
        await window.internalAPI.bookmarks.folderRemove(currentFolderId)
        currentFolderId = null
      })

      // 새 북마크 모달
      const addModal = document.getElementById('add-modal')
      const addTitle = document.getElementById('add-title')
      const addUrl = document.getElementById('add-url')
      const addFolder = document.getElementById('add-folder')
      function openAddModal() {
        // 폴더 옵션 채우기
        const opts = ['<option value="">— 루트 —</option>']
        function walk(parentId, depth) {
          for (const f of subfoldersOf(parentId)) {
            opts.push(`<option value="${f.id}">${'　'.repeat(depth)}${escape(f.name)}</option>`)
            walk(f.id, depth + 1)
          }
        }
        walk(null, 0)
        addFolder.innerHTML = opts.join('')
        addFolder.value = currentFolderId === null ? '' : String(currentFolderId)
        addTitle.value = ''
        addUrl.value = ''
        addModal.classList.remove('hidden')
        addTitle.focus()
      }
      function closeAddModal() { addModal.classList.add('hidden') }
      document.getElementById('new-bookmark').addEventListener('click', openAddModal)
      document.getElementById('add-cancel').addEventListener('click', closeAddModal)
      addModal.addEventListener('click', (e) => { if (e.target === addModal) closeAddModal() })
      document.getElementById('add-save').addEventListener('click', async () => {
        const url = addUrl.value.trim()
        if (!url) { alert('URL을 입력하세요.'); return }
        const title = addTitle.value.trim() || url
        const folderId = addFolder.value === '' ? null : Number(addFolder.value)
        await window.internalAPI.bookmarks.add({ url, title, folderId })
        closeAddModal()
      })

      // 내보내기
      document.getElementById('btn-export').addEventListener('click', async () => {
        const html = await window.internalAPI.bookmarks.exportHtml()
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        const ts = new Date().toISOString().slice(0, 10)
        a.href = url
        a.download = `bookmarks-${ts}.html`
        document.body.appendChild(a)
        a.click()
        document.body.removeChild(a)
        URL.revokeObjectURL(url)
      })

      // 가져오기
      const importFile = document.getElementById('import-file')
      document.getElementById('btn-import').addEventListener('click', () => importFile.click())
      importFile.addEventListener('change', async () => {
        const file = importFile.files?.[0]
        if (!file) return
        const text = await file.text()
        importFile.value = ''
        if (!confirm('이 파일의 북마크를 현재 목록에 추가할까요? (기존 항목은 그대로 유지됩니다.)')) return
        try {
          const result = await window.internalAPI.bookmarks.importHtml(text)
          alert(`가져오기 완료: 폴더 ${result.folders}개, 북마크 ${result.bookmarks}개 추가됨.`)
        } catch (err) {
          alert('가져오기 실패: ' + (err?.message || String(err)))
        }
      })

      if (window.internalAPI) window.internalAPI.bookmarks.onChanged(() => reload())
      reload()
    </script>
  </body>
</html>
