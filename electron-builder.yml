appId: com.ezbrowser.app
productName: ezBrowser
copyright: Copyright © 2026
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: dist
  buildResources: build

files:
  - "app/**/*"
  - "pages/**/*"
  - "resources/**/*"
  - "!resources/brand/**"        # 원본 이미지 마스터(아이콘은 build/icon.png·resources/icon.png 로 이미 복사됨) — 런타임 불필요, 설치 용량 절감
  - "!**/*.{ts,tsx,map,md}"
  - "!**/tsconfig.json"
  - "!**/SPEC.md"

asar: true
asarUnpack:
  - "**/*.node"
  - "node_modules/sql.js/dist/sql-wasm.wasm"
  - "node_modules/sql.js/dist/sql-wasm.js"

win:
  target:
    - target: nsis
      arch: [x64]
  publisherName: ezBrowser
  icon: build/icon.png
  # 코드 사이닝: 환경변수로 인증서 주입 (없으면 미서명 빌드).
  #   CSC_LINK            = .pfx 파일 경로 또는 base64
  #   CSC_KEY_PASSWORD    = 인증서 비밀번호
  # electron-builder 가 이 환경변수를 자동 감지해 signtool 로 서명한다. build/RELEASE.md 참고.

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.utilities
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # 공증(notarize): 환경변수 APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID 가 모두 있으면 자동 수행.
  notarize: false

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Network
  icon: build/icon.png

nsis:
  # 완전 자동 설치(원클릭): 더블클릭 → 위치 안 묻고 설치 → 자동 실행. Chrome/Edge/콕콕 방식.
  oneClick: true
  perMachine: false                # 사용자 단위 설치 → UAC(관리자) 프롬프트 없음
  runAfterFinish: true             # 설치 직후 자동 실행
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ezBrowser
  # 커스텀 경로/포터블이 필요하면 dist/win-unpacked/ 폴더를 그대로 복사해 사용.

# 자동 업데이트 — GitHub Releases (baboplater-blip/ezBrowser, Public). 2026-07-23 첫 릴리즈 v0.1.0 발행 완료.
#   업데이트 배포: package.json version 올림 → `GH_TOKEN=$(gh auth token) npx electron-builder --win --publish always`.
#     → 새 설치파일 + latest.yml 이 새 릴리즈로 업로드되고, 설치된 앱들이 6h 내(또는 부팅 시) 자동 감지·알림.
#   채널 분리: 안정=latest(정식 릴리즈), beta/nightly=prerelease + autoUpdater.channel.
#   electron-builder 가 이 설정을 app-update.yml 로 패키지에 넣어 electron-updater 가 읽는다.
publish:
  provider: github
  owner: baboplater-blip
  repo: ezBrowser
  releaseType: release
  publishAutoUpdate: true
